  - boot_disk_size: null
    configuration:
      - name: ios_config.txt
        content: |-
          hostname IOL
          !
          no logging console
          no aaa new-model
          !
          ip dhcp pool PNP
           network 198.18.192.0 255.255.255.0
           default-router 198.18.192.1
           dns-server 198.18.192.1
           domain-name dcloud.cisco.com
          !
          ip host pnpserver.dcloud.cisco.com 198.18.129.100
          !
          vtp mode transparent
          !
          vlan 10
           name PnPClients
          !
          interface Ethernet0/0
           description uplink
           no switchport
           ip address 198.18.130.200 255.255.192.0
           ip ospf 1 area 0
           no shutdown
          !
          interface Ethernet0/1
           description PnP Client
           switchport trunk encapsulation dot1q
           switchport trunk allowed vlan 10
           switchport mode trunk
           no shutdown
          !
          interface Ethernet0/2
           description PnP Client
           switchport trunk encapsulation dot1q
           switchport trunk allowed vlan 10
           switchport mode trunk
           no shutdown
          !
          interface Ethernet0/3
           description PnP Client
           switchport trunk encapsulation dot1q
           switchport trunk allowed vlan 10
           switchport mode trunk
           no shutdown
          !
          interface Vlan10
           ip address 198.18.192.1 255.255.255.0
           ip ospf 1 area 0
           no shutdown
          !
          router ospf 1
           passive-interface default
           no passive-interface Ethernet0/0
          !
          ip dns server
          ip dns primary dcloud.cisco.com soa hostmaster.dcloud.cisco.com 60 60 600 30 86400
          !
          pnp startup-vlan 10
          end
