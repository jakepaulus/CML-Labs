nodes:
  - boot_disk_size: null
    configuration:
      - name: iosxe_config.txt
        content: |-
          hostname R1
          no logging console
          !
          ip dhcp pool USERS
           network 10.1.3.0 255.255.255.0
           default-router 10.1.3.1
          !
          flow record LIMITED
          match ipv4 tos
          match ipv4 protocol
          match ipv4 source address
          match ipv4 destination address
          match transport source-port
          match transport destination-port
          match interface input
          match flow sampler
          collect ipv4 source address
          collect ipv4 destination address
          collect interface output
          collect transport tcp destination-port
          !
          flow monitor LOCAL
           record LIMITED
          !
          track 1 ip sla 1 state
          track 2 ip sla 2 state
          !
          class-map match-any BB3
           match protocol telnet
          class-map match-any BB4
           match protocol ssh
          !
          policy-map type epbr EPBR
           class BB3
            set ipv4 next-hop verify-availability 192.168.13.3 1 track 1
          class BB4
           set ipv4 next-hop verify-availability 192.168.14.4 1 track 2
          !
          interface GigabitEthernet1
           no shutdown
           ip address 192.168.13.1 255.255.255.0
           ip ospf 1 area 0
          interface GigabitEthernet2
           no shutdown
           ip address 192.168.14.1 255.255.255.0
           ip ospf 1 area 0
           negotiation auto
          interface GigabitEthernet3
           no shutdown
           ip flow monitor LOCAL input
           ip address 10.1.3.1 255.255.255.0
           ip ospf 1 area 0
           negotiation auto
           service-policy type epbr input EPBR
          interface GigabitEthernet4
           no ip address
           shutdown
          !
          router ospf 1
          !
          ip sla 1
           icmp-echo 192.168.13.3
          ip sla schedule 1 life forever start-time now
          ip sla 2
           icmp-echo 192.168.14.4
          ip sla schedule 2 life forever start-time now
          !
          line con 0
           exec-timeout 0 0
           logging synchronous
           end
