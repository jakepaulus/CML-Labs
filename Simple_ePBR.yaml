lab:
  description: ''
  notes: |-
    1. Review ePBR configuration on R1
    * `R1#show run | sect map|GigabitEthernet3`

    2. Generate traffic from console of desktop-0 to R2's loopback, e.g.:
    * `telnet 192.168.2.2`
    * `ssh 192.168.2.2`

    3. Verify ePBR routing decision. In the able below, you'll see the flows generated from step 2 above should consistently output on Gi1 for telnet and Gi2 for ssh.
    * `R1#show flow monitor LOCAL cache format table`
  title: Simple ePBR
  version: 0.3.0
