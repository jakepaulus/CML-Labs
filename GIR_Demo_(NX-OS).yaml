lab:
  description: ''
  notes: |-
    # Credentials:
    | Host | Username | Password | Enable Password |
    | --- | -------- | ------- | ----------- |
    | R1, R2, S1, S4 | none | none | none |
    | S2, S3 | cisco | cisco | none |
    | host1 | cisco | cisco | none |

    # Lab 1: NX-OS GIR and config checkpoint/diff/rollback
    1. Take note of the following network conditions:
        * OSPF neighbors for R1 include both S2 and S3
        * Etherchannels on S1 and R2 include both S2 and S3
        * vPC domain status
    2. Start maintenance mode on S3<br>
    `configure terminal`<br>
    `system mode maintenance`
    3. Checkpoint config on S3<br>
    `checkpoint before-maintenance`
    4. Take note of the following network conditions:
        * OSPF neighbors for R1 include both S2 and S3
        * Etherchannels on S1 and R2 include both S2 and S3
        * vPC domain status
    5. Make an innocuous change on S3
    6. View config diff between checkpoint and running config<br>
    `show diff rollback-patch checkpoint before-maintenance running-config`
    7. rollback change<br>
    `rollback running-config checkpoint before-maintenance`
    8. Exit maintenance mode on S3<br>
    `configure terminal`
    `no system mode maintenance`
    9. Take note of the following network conditions:
        * OSPF neighbors for R1 include both S2 and S3
        * Etherchannels on S1 and R2 include both S2 and S3
        * vPC domain status

    Note that we did a checkpoint inside of maintenance mode so that a rollback would be less impactful.

    #### References
    * https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/102x/configuration/system-management/cisco-nexus-9000-series-nx-os-system-management-configuration-guide-102x/m-configuring-graceful-insertion-and-removal-10x.html
    * https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/102x/configuration/system-management/cisco-nexus-9000-series-nx-os-system-management-configuration-guide-102x/m-configuring-rollback-10x.html

    While there are some differences, note that GIR is available for Catalyst switches as well.
    * https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9500/software/release/17-9/configuration_guide/ha/b_179_ha_9500_cg/configuring_graceful_insertion_and_removal__gir_.html
  title: GIR Demo (NX-OS)
  version: 0.2.1
